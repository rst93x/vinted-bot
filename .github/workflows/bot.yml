name: Vinted Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run bot
        run: python main.py
      - name: Save seen
        uses: actions/checkout@v3
      - name: Commit seen.json
        run: |
          git config user.email "bot@bot.com"
          git config user.name "Bot"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen"
          git push
